name: Quality checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: quality-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

env:
  CI: true

jobs:
  application:
    name: Application quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24
      - name: Install locked dependencies
        run: npm ci
      - name: Validate environment contract
        run: npm run check:env-contract
      - name: Protect migration history
        run: npm run check:migrations
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Typecheck, lint, test, and build
        run: npm run verify

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1
      - name: Install locked dependencies
        run: npm ci
      - name: Start disposable Supabase
        run: supabase start --exclude studio,imgproxy,edge-runtime,realtime,logflare,vector,mailpit,supavisor
      - name: Test database and RLS
        run: npm run test:db
      - name: Install test browser
        run: npx playwright install --with-deps chromium
      - name: Test application boundaries
        run: npm run test:e2e
      - if: failure()
        name: Preserve browser failure evidence
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: playwright-failure-${{ github.run_id }}
          path: test-results/
          retention-days: 7
